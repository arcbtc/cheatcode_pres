name: Build presentation outputs

on:
  workflow_dispatch:
  push:
    paths:
      - 'presentation.md'
      - 'notes_sheet.md'
      - '.marprc.yml'
      - 'images/**'
      - 'scripts/**'
      - '.github/workflows/build-presentation.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build presentation HTML
        run: |
          marp             --allow-local-files             --html             --output index.html             presentation.md

      - name: Build notes sheet PDF
        run: |
          pandoc             notes_sheet.md             --standalone             --css ./scripts/pandoc.css             --pdf-engine=wkhtmltopdf             -o notes_sheet.pdf

      - name: Commit generated outputs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html notes_sheet.pdf
          if git diff --cached --quiet; then
            echo "No generated output changes to commit"
            exit 0
          fi
          git commit -m "Build presentation outputs"
          git push
